name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: DeLaGuardo/setup-clojure@13.6
        with:
          cli: latest

      - uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Prepare dependencies
        run: clojure -P -M:test

      - name: Test
        run: clojure -M:test

      - name: Run the demo
        run: clojure -M:run

  lint:
    name: Format & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: DeLaGuardo/setup-clojure@13.6
        with:
          cli: latest
          cljfmt: latest
          clj-kondo: latest

      - name: Check formatting
        run: cljfmt check src test

      - name: Lint
        run: clj-kondo --lint src test
